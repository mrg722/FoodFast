spring.application.name=inventario-servicio
server.port=8082

# Permite que Spring Boot escuche conexiones externas dentro de tu red local
server.address=0.0.0.0

spring.datasource.url=jdbc:mysql://localhost:3306/inventario_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway crea y versiona las tablas desde src/main/resources/db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Hibernate solo valida que las entidades coincidan con las tablas de Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# CORS para Actuator: permite pruebas desde frontend local, celular u otro PC
management.endpoints.web.cors.allowed-origin-patterns=*
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
management.endpoints.web.cors.allowed-headers=*

# Logs
logging.level.com.foodfast.inventario_servicio=INFO