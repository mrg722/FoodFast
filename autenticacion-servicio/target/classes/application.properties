spring.application.name=autenticacion-servicio
server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/autenticacion_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway crea y versiona las tablas desde src/main/resources/db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Hibernate solo valida que las entidades coincidan con las tablas de Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Secreto JWT: debe tener minimo 42 caracteres segun consideracion del profesor.
# Este mismo valor se debe repetir luego en los microservicios protegidos.
jwt.secret=FoodFastClaveJWTUltraSegura2026ParaMicroserviciosConMasDe42Caracteres
jwt.expiration-ms=86400000

logging.level.com.foodfast.autenticacion_servicio=INFO
logging.level.org.springframework.security=INFO
