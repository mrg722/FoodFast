spring.application.name=cliente-servicio
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/cliente_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.foodfast.cliente_servicio=INFO
logging.level.org.hibernate.SQL=DEBUG

# Seguridad JWT futura: usar el mismo secreto en autenticacion-servicio y servicios protegidos.
# Debe tener minimo 42 caracteres. No se activa aun para no bloquear pruebas CRUD.
# jwt.secret=FoodFastClaveJWTUltraSegura2026ConMasDe42CaracteresParaFirmarTokens
