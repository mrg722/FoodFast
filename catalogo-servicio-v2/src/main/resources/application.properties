spring.application.name=catalogo-servicio
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/catalogo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway crea y versiona las tablas desde src/main/resources/db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Hibernate solo valida que las entidades coincidan con las tablas de Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.foodfast.catalogo_servicio=INFO
